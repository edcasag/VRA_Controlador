; POC VRA_Controlador — 1 env unico com 4 modos selecionaveis via macro.
;
; Como usar:
;   1. Para escolher o modo, descomente UMA das linhas "build_flags"
;      abaixo e comente as outras.
;   2. Compile com: pio run        (sempre o mesmo comando, nao precisa -e)
;
; Modos:
;   BUILD_SIM     -> simulacao completa standalone, default da v1.0.0
;                    (menu Serial seleciona KML do LittleFS, gera trajetoria
;                     boustrofedon, simula PID + atuador, relatorio final)
;   BUILD_ANALISE -> sumario do KML + CSV + 9 pontos demo (sem hardware extra)
;   BUILD_TESTS   -> 9 testes cronometrados (latencia, parser, dose, PID, etc.)
;   BUILD_POC     -> sistema completo (GPS UART2 + atuador PWM + PID + 4 modos)
;
; Idioma das mensagens (BUILD_SIM):
;   -DLANG_PT (default) ou -DLANG_EN. Trocar e recompilar muda menu + relatorio.
;
; Filesystem (KMLs e CSVs em data/):
;   pio run -t uploadfs

[platformio]
default_envs = vra

[env:vra]
platform        = espressif32
board           = esp32doit-devkit-v1
framework       = arduino
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder

board_build.filesystem = littlefs

; ========== ESCOLHA DO MODO (descomente UMA das linhas abaixo) ==========
build_flags = -std=gnu++17 -DBUILD_SIM -DLANG_PT      ; default da publicacao v1.0.0
;build_flags = -std=gnu++17 -DBUILD_SIM -DLANG_EN     ; mesma simulacao em ingles
;build_flags = -std=gnu++17 -DBUILD_ANALISE
;build_flags = -std=gnu++17 -DBUILD_TESTS
;build_flags = -std=gnu++17 -DBUILD_POC
