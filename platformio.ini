; POC VRA_Controlador — 1 env unico com 3 modos selecionaveis via macro.
;
; Como usar:
;   1. Para escolher o modo, descomente UMA das tres linhas "build_flags"
;      abaixo e comente as outras duas.
;   2. Compile com: pio run        (sempre o mesmo comando, nao precisa -e)
;
; Modos:
;   BUILD_ANALISE -> sumario do KML + CSV + 9 pontos demo (sem hardware extra)
;   BUILD_TESTS   -> 9 testes cronometrados (latencia, parser, dose, PID, etc.)
;   BUILD_POC     -> sistema completo (GPS UART2 + atuador PWM + PID + 4 modos)
;
; Filesystem (KMLs em data/):
;   pio run -t uploadfs

[platformio]
default_envs = vra

[env:vra]
platform        = espressif32
board           = esp32doit-devkit-v1
framework       = arduino
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder

board_build.filesystem = littlefs

; ========== ESCOLHA DO MODO (descomente UMA das linhas abaixo) ==========
;build_flags = -std=gnu++17 -DBUILD_ANALISE
;build_flags = -std=gnu++17 -DBUILD_TESTS
build_flags = -std=gnu++17 -DBUILD_POC
