; POC VRA_Controlador — 3 envs:
;   analise (default, sem hardware extra) — sumário KML + CSV + 9 pontos demo
;   poc                                    — sistema completo (GPS, atuador, PID)
;   tests                                  — 9 testes cronometrados
;
; Build:
;   pio run                          (analise)
;   pio run -e tests   -t upload     (com FS via -t uploadfs)
;   pio run -e poc     -t upload
; Filesystem (KMLs):
;   pio run -t uploadfs              (analise default)
;   pio run -e poc -t uploadfs

[platformio]
default_envs = analise

[env]
platform        = espressif32
board           = esp32doit-devkit-v1
framework       = arduino
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder
build_flags     = -std=gnu++17

[env:analise]
build_src_filter        = +<*> -<main_poc.cpp> -<main_tests.cpp>
board_build.filesystem  = littlefs

[env:poc]
build_src_filter        = +<*> -<main_analise.cpp> -<main_tests.cpp>
board_build.filesystem  = littlefs

[env:tests]
build_src_filter        = +<*> -<main_analise.cpp> -<main_poc.cpp>
board_build.filesystem  = littlefs
